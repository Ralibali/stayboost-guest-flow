project_id = "stayboost-guest-flow"

# Gästsidan är publik — guest_token i länken är nyckeln, ingen JWT krävs.
[functions.guest-page]
verify_jwt = false

# iCal-exportflödet är publikt — kanalerna pollar det utan JWT,
# enhetens feed-token i länken är nyckeln.
[functions.ical-export]
verify_jwt = false

[functions.ical-sync]
verify_jwt = true

[functions.send-scheduled-messages]
verify_jwt = true
