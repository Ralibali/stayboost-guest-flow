project_id = "stayboost-guest-flow"

# Gästsidan är publik — guest_token i länken är nyckeln, ingen JWT krävs.
[functions.guest-page]
verify_jwt = false

# iCal-exportflödet är publikt — kanalerna pollar det utan JWT,
# enhetens feed-token i länken är nyckeln.
[functions.ical-export]
verify_jwt = false

# Bokningsmotorn är publik — anläggningens slug är adressen,
# känsliga operationer (överlapp, pris) sker server-side.
[functions.booking-engine]
verify_jwt = false

# Sirvoys webhook postar hit utan JWT — token i länken är nyckeln.
[functions.sirvoy-webhook]
verify_jwt = false

# Stripe postar hit utan JWT — HMAC-signaturen i Stripe-Signature-headern
# verifieras mot STRIPE_WEBHOOK_SECRET i funktionen.
[functions.stripe-webhook]
verify_jwt = false

# Chatt-widgeten är publik — slugen identifierar anläggningen,
# honeypot + återkomst-spärr skyddar mot spam.
[functions.chat-message]
verify_jwt = false

# Återbetalning kräver inloggad ägare (JWT) — default verify_jwt = true
# räcker, men vi är explicita.
[functions.stripe-refund]
verify_jwt = true

[functions.ical-sync]
verify_jwt = true

[functions.send-scheduled-messages]
verify_jwt = true
