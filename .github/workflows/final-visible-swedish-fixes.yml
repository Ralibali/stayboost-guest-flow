name: Final visible Swedish fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  final-visible-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprakgranskning-svenska
          fetch-depth: 0

      - name: Correct remaining visible forms
        run: |
          python3 - <<'PY'
          from pathlib import Path

          operations = {
              'src/routes/demo/stad.tsx': [
                  ('från dashboarden.', 'från översikten.'),
              ],
              'src/routes/demo/boka.tsx': [
                  ('Bokningen syns direkt i ägarens dashboard och kalender', 'Bokningen syns direkt i ägarens översikt och kalender'),
              ],
              'src/components/landing/CaseStudy.tsx': [
                  ('idag. Ingen gäst-, personal- eller betalningsdata visas.', 'i dag. Ingen gäst-, personal- eller betalningsdata visas.'),
              ],
              'src/components/landing/BookFounder.tsx': [
                  ('hur din drift ser ut idag', 'hur din drift ser ut i dag'),
              ],
              'src/components/landing/LiveDemo.tsx': [
                  ('title: "Ägar-dashboarden"', 'title: "Ägaröversikten"'),
              ],
              'src/components/landing/ProductTour.tsx': [
                  ('Städ · idag', 'Städning · i dag'),
              ],
          }

          for filename, replacements in operations.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              for old, new in replacements:
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bunx vitest run

      - name: Commit final visible fixes
        run: |
          if git diff --quiet -- src; then
            echo 'No source changes to commit'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src
          git diff --cached --check
          git commit -m 'Rätta återstående synlig svensk copy'
          git push origin HEAD:agent/sprakgranskning-svenska
