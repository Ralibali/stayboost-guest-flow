                  ('label="Wifi-lösenord"', 'label="Lösenord (wifi)"', 1),
                  ("Bädda in på er hemsida", "Bädda in på din webbplats", 1),
              ],
              "src/routes/app/kallor.tsx": [
                  ("I Airbnb: Kalender", "På Airbnb: Kalender", 1),
                  ("I Booking.com: Kalender", "På Booking.com: Kalender", 1),
              ],
              "src/routes/app/login.tsx": [
                  ("Bekräfta via mejlen om din Supabase kräver det — sen loggar du in.", "Bekräfta via mejlet om din Supabase kräver det – sedan loggar du in.", 1),
                  ('"Vänta…"', '"Vänta …"', 1),
              ],
              "src/routes/app/mallar.tsx": [
