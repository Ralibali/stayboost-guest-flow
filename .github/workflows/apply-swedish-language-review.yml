name: Apply Swedish language review

on:
  push:
    branches:
      - agent/sprakgranskning-svenska
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-language-review:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.message != 'Språkgranska svensk copy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprakgranskning-svenska
          fetch-depth: 0

      - name: Apply reviewed Swedish copy
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

