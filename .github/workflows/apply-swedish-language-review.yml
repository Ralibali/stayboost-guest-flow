                  ("{staff.role}", '{staff.role === "Städ" ? "Städning" : staff.role}', 1),
              ],
              "src/routes/demo/presentkort.tsx": [
                  ("presentkort på mailen direkt", "presentkort via e-post direkt", 1),
              ],
              "src/routes/demo/rapporter.tsx": [
