              "src/routes/demo/stad.tsx": [
                  ('avresa: "Avresestäd"', 'avresa: "Avresestädning"', 1),
                  ('storstäd: "Storstäd"', 'storstäd: "Storstädning"', 1),
              ],
              "src/routes/dpa.tsx": [
