                  ("retentionpolicy", "gallringspolicy", 1),
              ],
          }

          for file_name, replacements in operations.items():
              path = Path(file_name)
              text = path.read_text(encoding="utf-8")
              for old, new, expected in replacements:
                  found = text.count(old)
                  if found != expected:
                      raise RuntimeError(
                          f"{file_name}: expected {expected} occurrence(s) of {old!r}, found {found}"
                      )
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")

          print(f"Updated {len(operations)} files")
          PY

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bunx vitest run

      - name: Commit reviewed copy
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git diff --cached --check
          git commit -m "Språkgranska svensk copy"
          git push origin HEAD:agent/sprakgranskning-svenska
