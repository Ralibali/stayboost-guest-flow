name: Inspect Swedish language review

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show latest language-review run
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.request

          repo = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/actions/workflows/apply-swedish-language-review.yml/runs?branch=agent%2Fsprakgranskning-svenska&event=workflow_dispatch&per_page=1"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          latest = None
          for _ in range(30):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
              runs = payload.get("workflow_runs", [])
              if runs:
                  latest = runs[0]
                  print(json.dumps({
                      "id": latest["id"],
                      "status": latest["status"],
                      "conclusion": latest.get("conclusion"),
                      "html_url": latest["html_url"],
                      "head_sha": latest["head_sha"],
                  }, ensure_ascii=False))
                  if latest["status"] == "completed":
                      break
              time.sleep(5)

          if latest is None:
              raise SystemExit("No language-review run found")
          if latest["status"] != "completed":
              raise SystemExit("Language-review run did not complete in time")
          if latest.get("conclusion") != "success":
              raise SystemExit(f"Language-review run failed: {latest.get('conclusion')} (run id {latest['id']})")
          PY
