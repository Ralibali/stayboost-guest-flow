name: Export repository snapshot

on:
  push:
    branches:
      - agent/sprakgranskning-svenska
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create repository archive
        run: |
          tar --exclude='.git' --exclude='node_modules' -czf stayboost-repository.tar.gz .

      - name: Upload repository archive
        uses: actions/upload-artifact@v4
        with:
          name: stayboost-repository
          path: stayboost-repository.tar.gz
          retention-days: 1
