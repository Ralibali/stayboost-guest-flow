name: Inspect Swedish review failure

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  inspect-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Print failed language-review log tail
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          runs_url = f"https://api.github.com/repos/{repo}/actions/workflows/apply-swedish-language-review.yml/runs?branch=agent%2Fsprakgranskning-svenska&event=workflow_dispatch&per_page=1"
          with urllib.request.urlopen(urllib.request.Request(runs_url, headers=headers)) as response:
              run = json.load(response)["workflow_runs"][0]
          print(f"RUN_ID={run['id']} STATUS={run['status']} CONCLUSION={run.get('conclusion')}")

          jobs_url = f"https://api.github.com/repos/{repo}/actions/runs/{run['id']}/jobs"
          with urllib.request.urlopen(urllib.request.Request(jobs_url, headers=headers)) as response:
              jobs = json.load(response)["jobs"]
          failed = next(job for job in jobs if job.get("conclusion") == "failure")
          print(f"JOB_ID={failed['id']} NAME={failed['name']}")

          logs_url = f"https://api.github.com/repos/{repo}/actions/jobs/{failed['id']}/logs"
          request = urllib.request.Request(logs_url, headers=headers)
          with urllib.request.urlopen(request) as response:
              log_text = response.read().decode("utf-8", errors="replace")
          lines = log_text.splitlines()
          print("\n".join(lines[-50:]))
          PY
