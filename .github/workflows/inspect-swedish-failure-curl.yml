name: Read Swedish review failure

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  read-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Print failed language-review log tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 12
          RUN_ID=$(gh api \
            --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/apply-swedish-language-review.yml/runs" \
            -f branch='agent/sprakgranskning-svenska' \
            -f event='workflow_dispatch' \
            -f per_page=1 \
            --jq '.workflow_runs[0].id')
          echo "RUN_ID=${RUN_ID}"
          JOB_ID=$(gh api \
            --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | .id' | head -1)
          echo "JOB_ID=${JOB_ID}"
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" > failed-job.log
          tail -80 failed-job.log
