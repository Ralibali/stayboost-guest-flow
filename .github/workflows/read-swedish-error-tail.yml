name: Read Swedish error tail

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  read-error-tail:
    runs-on: ubuntu-latest
    steps:
      - name: Print final error lines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88210808831/logs" > failed-job.log
          tail -20 failed-job.log
