name: Read final copy findings

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  read-findings:
    runs-on: ubuntu-latest
    steps:
      - name: Print source findings from final check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88211664554/logs" > final-check.log
          grep -E 'src/.*(SMS|Imorgon|idag|mailen|på mail|tips-mail|backoffice|dashboard|Wifi-namn|Wifi-lösenord)' final-check.log || true
