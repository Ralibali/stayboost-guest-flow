name: Execute Swedish language review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  execute-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprakgranskning-svenska
          fetch-depth: 0

      - name: Apply reviewed copy
        run: |
          if [ "$(git log -1 --pretty=%s)" = "Språkgranska svensk copy" ]; then
            echo "Language review already applied"
            exit 0
          fi

          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-swedish-language-review.yml').read_text(encoding='utf-8')
          script_block = workflow.split("python3 - <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          script = textwrap.dedent(script_block)
          script = script.replace(
              '(\">Imorgon<\", \">I morgon<\", 1),',
              '(\"            Imorgon\\n\", \"            I morgon\\n\", 1),',
              1,
          )
          exec(compile(script, 'swedish-language-review.py', 'exec'), {})
          PY

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bunx vitest run

      - name: Commit reviewed copy
        run: |
          if git diff --quiet -- src; then
            echo "No source changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git diff --cached --check
          git commit -m "Språkgranska svensk copy"
          git push origin HEAD:agent/sprakgranskning-svenska
