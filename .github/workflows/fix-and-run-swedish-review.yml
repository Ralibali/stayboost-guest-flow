name: Fix and run Swedish language review

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  fix-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprakgranskning-svenska
          fetch-depth: 0

      - name: Fix multiline text match
        id: fix
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/apply-swedish-language-review.yml')
          text = path.read_text(encoding='utf-8')
          old = '(\">Imorgon<\", \">I morgon<\", 1),'
          new = '(\"            Imorgon\\n\", \"            I morgon\\n\", 1),'
          if old not in text:
              print('Pattern already fixed')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit workflow fix
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/apply-swedish-language-review.yml
          git commit -m "Rätta språkjobbets texthantering"
          git push origin HEAD:agent/sprakgranskning-svenska

      - name: Dispatch corrected language review
        if: steps.fix.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          sleep 3
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/apply-swedish-language-review.yml/dispatches" \
            --data '{"ref":"agent/sprakgranskning-svenska"}'
